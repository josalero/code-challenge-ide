spring:
  devtools:
    add-properties: false
  main:
    allow-bean-definition-overriding: true
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

ctl:
  registration-enabled: true
  jwt-secret: test-jwt-secret-must-be-at-least-32-characters-long
  jwt-expiration-hours: 24
  cors-allowed-origins: http://localhost:5173
  challenges-path: ${CTL_CHALLENGES_PATH:challenges}
  runner-java-26-image: code-challenge-ide-runner-java-26:test
  docker-enabled: false
  lsp-enabled: false
  ai-provider: openrouter
  openrouter-api-key: ""
  mail:
    enabled: false
    host: ""
    port: 587
    username: ""
    password: ""
    from-name: Code Training Lab
    login-url: http://localhost:5173/login
    debug: false

logging:
  level:
    root: WARN
    com.codetraininglab: INFO
