spring:
  application:
    name: code-training-lab
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  config:
    import: optional:file:../.env[.properties],optional:file:.env[.properties]
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/${PG_DB:code_training_lab}}
    username: ${SPRING_DATASOURCE_USERNAME:${PG_USER:postgres}}
    password: ${SPRING_DATASOURCE_PASSWORD:${PG_PASSWORD:postgres}}
    hikari:
      connection-timeout: 10000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:${RMQ_USER:guest}}
    password: ${SPRING_RABBITMQ_PASSWORD:${RMQ_PASSWORD:guest}}
    listener:
      simple:
        concurrency: ${RMQ_LISTENER_CONCURRENCY:4}
        max-concurrency: ${RMQ_LISTENER_MAX_CONCURRENCY:8}
        prefetch: ${RMQ_LISTENER_PREFETCH:4}
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1s
          multiplier: 2
          max-interval: 10s
        default-requeue-rejected: false

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  info:
    env:
      enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

info:
  app:
    name: ${spring.application.name}
    description: Multi-language code challenge platform

ctl:
  registration-enabled: ${REGISTRATION_ENABLED:false}
  jwt-secret: ${JWT_SECRET:dev-only-secret-change-me-in-production-32chars}
  jwt-expiration-hours: 24
  # Include common Vite ports; patterns cover other localhost ports after backend restart.
  cors-allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:5176,http://127.0.0.1:5173,http://127.0.0.1:5174,http://127.0.0.1:5175,http://localhost:*,http://127.0.0.1:*}
  challenges-path: ${CTL_CHALLENGES_PATH:challenges}
  runner-java-26-image: ${RUNNER_JAVA_26_IMAGE:code-challenge-ide-runner-java-26:latest}
  runner-maven-cache-volume: ${RUNNER_MAVEN_CACHE_VOLUME:ctl-runner-m2-cache}
  runner-pool-enabled: ${RUNNER_POOL_ENABLED:true}
  runner-pool-idle-minutes: ${RUNNER_POOL_IDLE_MINUTES:60}
  lsp-images:
    java: ${LSP_JAVA_IMAGE:code-challenge-ide-lsp-java:local}
    python: ${LSP_PYTHON_IMAGE:code-challenge-ide-lsp-python:local}
    go: ${LSP_GO_IMAGE:code-challenge-ide-lsp-go:local}
    node: ${LSP_TYPESCRIPT_IMAGE:code-challenge-ide-lsp-typescript:local}
    typescript: ${LSP_TYPESCRIPT_IMAGE:code-challenge-ide-lsp-typescript:local}
    react: ${LSP_TYPESCRIPT_IMAGE:code-challenge-ide-lsp-typescript:local}
    vue: ${LSP_TYPESCRIPT_IMAGE:code-challenge-ide-lsp-typescript:local}
    angular: ${LSP_TYPESCRIPT_IMAGE:code-challenge-ide-lsp-typescript:local}
    csharp: ${LSP_DOTNET_IMAGE:code-challenge-ide-lsp-dotnet:local}
    rust: ${LSP_RUST_IMAGE:code-challenge-ide-lsp-rust:local}
    cpp: ${LSP_CPP_IMAGE:code-challenge-ide-lsp-cpp:local}
  lsp-idle-minutes: 5
  idempotency-ttl-hours: 24
  ai-provider: ${AI_PROVIDER:openrouter}
  openrouter-api-key: ${OPENROUTER_API_KEY:}
  openrouter-model: ${OPENROUTER_MODEL:openai/gpt-4o-mini}
  ollama-base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
  ollama-model: ${OLLAMA_MODEL:qwen2.5-coder}
  docker-enabled: ${CTL_DOCKER_ENABLED:true}
  lsp-enabled: ${CTL_LSP_ENABLED:true}
  repo-root: ${CTL_REPO_ROOT:}
  ops-data-dir: ${CTL_OPS_DATA_DIR:}
  runner-pool-warm-on-startup: ${RUNNER_POOL_WARM_ON_STARTUP:false}
  runner-infra-warm-scheduled-enabled: ${RUNNER_INFRA_WARM_SCHEDULED_ENABLED:false}
  runner-infra-warm-interval-minutes: ${RUNNER_INFRA_WARM_INTERVAL_MINUTES:30}
  runner-infra-warm-initial-delay-minutes: ${RUNNER_INFRA_WARM_INITIAL_DELAY_MINUTES:5}
  mail:
    enabled: ${CTL_MAIL_ENABLED:false}
    host: ${CTL_MAIL_HOST:mail.privateemail.com}
    port: ${CTL_MAIL_PORT:587}
    username: ${CTL_MAIL_USERNAME:${EMAIL_FROM_USER:}}
    password: ${CTL_MAIL_PASSWORD:${EMAIL_FROM_PASSWORD:}}
    from-name: ${CTL_MAIL_FROM_NAME:${EMAIL_FROM_NAME:Code Training Lab}}
    login-url: ${CTL_MAIL_LOGIN_URL:http://localhost:5173/login}
    debug: ${CTL_MAIL_DEBUG:false}

springdoc:
  api-docs:
    path: /api/v1/openapi
  swagger-ui:
    path: /api/v1/swagger-ui.html
