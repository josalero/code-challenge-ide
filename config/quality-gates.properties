# Quality gates enforced on every PR (see .github/workflows/ci.yml).
# Adjust these values as the codebase matures; CI reads this file via Gradle.

# Minimum covered ratio (0.0 - 1.0) after exclusions in be/gradle/jacoco.gradle
lineCoverageMinimum=0.80
branchCoverageMinimum=0.55

# Fail the build if any unit/integration test fails
testsMustPass=true
