name: Docker

# Publishes application images to GHCR.
# Images: be, fe, runner-java-17/21/26, lsp-java

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    tags: [v*.*.*]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: code-challenge-ide

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: be
            context: .
            dockerfile: be/Dockerfile
          - component: fe
            context: fe
            dockerfile: fe/Dockerfile
          - component: runner-java-17
            context: runners/java
            dockerfile: runners/java/Dockerfile
            build-args: JAVA_MAJOR=17
          - component: runner-java-21
            context: runners/java
            dockerfile: runners/java/Dockerfile
            build-args: JAVA_MAJOR=21
          - component: runner-java-25
            context: runners/java
            dockerfile: runners/java/Dockerfile
            build-args: JAVA_MAJOR=25
          - component: runner-java-26
            context: runners/java
            dockerfile: runners/java/Dockerfile
            build-args: JAVA_MAJOR=26
          - component: lsp-java
            context: runners/lsp-java
            dockerfile: runners/lsp-java/Dockerfile

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v3.7.0
        with:
          cosign-release: v2.4.1

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_PREFIX }}-${{ matrix.component }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          build-args: ${{ matrix.build-args }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}

      - name: Sign the published Docker image
        if: github.event_name != 'pull_request'
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
        run: echo "${TAGS}" | xargs -I {} cosign sign --yes {}@${DIGEST}
