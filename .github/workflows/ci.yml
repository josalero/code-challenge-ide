# Required checks for pull requests — blocks merge when tests fail or coverage is below
# thresholds in config/quality-gates.properties (enforced by :be:check / JaCoCo).
#
# In GitHub: Settings → Branches → Branch protection → Require status checks:
#   - ci-gate   (or individually: backend-quality, frontend-quality, backend-docker-e2e)

name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-quality:
    name: backend-quality
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 26
        uses: actions/setup-java@v4
        with:
          java-version: '26'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run tests and coverage gates
        run: ./gradlew :be:check --no-daemon

      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: be/build/reports/jacoco/test/
          retention-days: 14

  frontend-quality:
    name: frontend-quality
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: fe/package-lock.json

      - name: Install dependencies
        working-directory: fe
        run: npm ci

      - name: Lint
        working-directory: fe
        run: npm run lint

      - name: Build
        working-directory: fe
        run: npm run build

  backend-docker-e2e:
    name: backend-docker-e2e
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 26
        uses: actions/setup-java@v4
        with:
          java-version: '26'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Java 26 runner image
        run: |
          docker build \
            -f runners/java/Dockerfile \
            --build-arg JAVA_MAJOR=26 \
            -t code-challenge-ide-runner-java-26:local \
            runners/java

      - name: Run Docker submission flow test
        env:
          CTL_INTEGRATION_DOCKER: 'true'
        run: ./gradlew :be:test --tests com.codetraininglab.submission.application.SubmissionFlowDockerIntegrationTest --no-daemon

  ci-gate:
    name: ci-gate
    needs: [backend-quality, frontend-quality, backend-docker-e2e]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Require all CI jobs to succeed
        run: |
          echo "backend-quality: ${{ needs.backend-quality.result }}"
          echo "frontend-quality: ${{ needs.frontend-quality.result }}"
          echo "backend-docker-e2e: ${{ needs.backend-docker-e2e.result }}"
          test "${{ needs.backend-quality.result }}" = "success"
          test "${{ needs.frontend-quality.result }}" = "success"
          test "${{ needs.backend-docker-e2e.result }}" = "success"
