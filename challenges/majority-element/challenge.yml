slug: majority-element
title: Majority Element
difficulty: easy
language: java
default_runtime_version: "26"
description_md: |
  ## What to do
  Element appearing more than `n/2` times exists. Return it via `Solution.majorityElement(int[] nums)`.
  
  Read the task and signature carefully. Use the public examples to clarify edge cases before submitting.
  
  
  ## Examples
  - `[3, 2, 3]` → `3`
  - `[2, 2, 1, 1, 1, 2, 2]` → `2`
  ## Constraints
  - Implement only the required API; do not change test files.
  - Hidden tests may include additional edge cases beyond the examples.
  - Use the `Solution` class and static methods unless the starter specifies otherwise.
  
  ## Method to implement
  
  `n/2`
gating_config:
  line_coverage_percent: 80
  checkstyle_max_errors: 0
limits:
  per_test_timeout_seconds: 10
starter_main_class: com.challenge.Solution
public_tests_meta:
  - name: "expect_majorityelement_new_int_3_2_3_to_equal_3"
    description: "Expect majorityElement(new int[] {3,2,3}) to equal 3"
  - name: "expect_majorityelement_new_int_2_2_1_1_1_2_2_to_"
    description: "Expect majorityElement(new int[] {2,2,1,1,1,2,2}) to equal 2"
