slug: todo-list-react
title: Todo List (React)
difficulty: medium
language: react
default_runtime_version: "19"
description_md: |
  ## What to do
  Implement `TodoList` — text input adds todos; clicking a todo toggles `done` class on its `<li>`.
  
  Implement the component or module described above so it passes the Vitest tests. Focus on rendering, user interaction, and predictable state — not routing or backend APIs.
  
  ## Constraints
  - Implement only the required API; do not change test files.
  - Hidden tests may include additional edge cases beyond the examples.
  - Export the component/service/pipe expected by the Vitest suite.
  - Aim for an efficient solution; brute force may time out on large hidden inputs.
  
  ## Method to implement
  
  `TodoList`
gating_config:
