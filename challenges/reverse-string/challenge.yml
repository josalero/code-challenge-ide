slug: reverse-string
title: Reverse String
difficulty: easy
language: java
default_runtime_version: "26"
description_md: |
  ## What to do
  Implement `Solution.reverse(String input)` to return the input string reversed.
  
  **Examples**
  - `"hello"` → `"olleh"`
  - `"Java"` → `"avaJ"`
  - `""` → `""`
  
  Return a new string (or mutate in place where applicable) with characters in reverse order.
  
  ## Constraints
  - Implement only the required API; do not change test files.
  - Hidden tests may include additional edge cases beyond the examples.
  - Use the `Solution` class and static methods unless the starter specifies otherwise.
  
  ## Method to implement
  
  `Solution.reverse(String input)`
gating_config:
  line_coverage_percent: 80
  checkstyle_max_errors: 0
limits:
  per_test_timeout_seconds: 10
starter_main_class: com.challenge.Solution
public_tests_meta:
  - name: "expect_reverse_hello_to_equal_olleh"
    description: "Expect reverse(\"hello\") to equal \"olleh\""
  - name: "expect_reverse_to_equal"
    description: "Expect reverse(\"\") to equal \"\""
  - name: "expect_reverse_a_to_equal_a"
    description: "Expect reverse(\"a\") to equal \"a\""
