slug: missing-number-csharp
title: Missing Number (C#)
difficulty: easy
language: csharp
default_runtime_version: "8.0"
description_md: |
  ## What to do
  Array contains n distinct values in [0,n]; one missing. Return it.
  
  The array `nums` contains `n` distinct values taken from the range `[0, n]`. Exactly one number from that range is missing.
  
  ## Examples
  - `[3, 0, 1]` → `2`
  - `[0]` → `1`
  
  ## Constraints
  - Implement only the required API; do not change test files.
  - Hidden tests may include additional edge cases beyond the examples.
gating_config:
  line_coverage_percent: 80
  checkstyle_max_errors: 0
limits:
  per_test_timeout_seconds: 10
  session_duration_minutes: 30
public_tests_meta:
  - name: "Missingnumber301ShouldEqual2"
    description: "missingNumber([3, 0, 1]) should equal 2"
  - name: "Missingnumber0ShouldEqual1"
    description: "missingNumber([0]) should equal 1"
