slug: gcd
title: Greatest Common Divisor
difficulty: easy
language: java
default_runtime_version: "26"
description_md: |
  ## What to do
  Implement `Solution.gcd(int a, int b)` returning the greatest common divisor (Euclidean algorithm).
  
  The greatest common divisor (GCD) is the largest integer that divides both inputs without remainder.
  
  
  ## Examples
  - `54, 24` → `6`
  - `17, 13` → `1`
  - `25, 15` → `5`
  ## Constraints
  - Implement only the required API; do not change test files.
  - Hidden tests may include additional edge cases beyond the examples.
  - Use the `Solution` class and static methods unless the starter specifies otherwise.
  
  ## Method to implement
  
  `Solution.gcd(int a, int b)`
gating_config:
  line_coverage_percent: 80
  checkstyle_max_errors: 0
limits:
  per_test_timeout_seconds: 10
starter_main_class: com.challenge.Solution
public_tests_meta:
  - name: "expect_gcd_54_24_to_equal_6"
    description: "Expect gcd(54, 24) to equal 6"
  - name: "expect_gcd_17_13_to_equal_1"
    description: "Expect gcd(17, 13) to equal 1"
  - name: "expect_gcd_25_15_to_equal_5"
    description: "Expect gcd(25, 15) to equal 5"
