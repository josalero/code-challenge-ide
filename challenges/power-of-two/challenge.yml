slug: power-of-two
title: Power of Two
difficulty: easy
language: java
default_runtime_version: "26"
description_md: |
  ## What to do
  Implement `Solution.isPowerOfTwo(int n)` — `true` if `n` is a power of two (`n > 0`).
  
  Return whether `n` is a power of two (including `1 = 2^0`).
  
  ## Examples
  - `1` → `true`
  - `3` → `false`
  
  ## Constraints
  - Implement only the required API; do not change test files.
  - Hidden tests may include additional edge cases beyond the examples.
  - Use the `Solution` class and static methods unless the starter specifies otherwise.
  
  ## Method to implement
  
  `Solution.isPowerOfTwo(int n)`
gating_config:
  line_coverage_percent: 80
  checkstyle_max_errors: 0
limits:
  per_test_timeout_seconds: 10
  session_duration_minutes: 30
starter_main_class: com.challenge.Solution
public_tests_meta:
  - name: "expect_ispoweroftwo_1_to_equal_true"
    description: "Expect isPowerOfTwo(1) to equal true"
  - name: "expect_ispoweroftwo_3_to_equal_false"
    description: "Expect isPowerOfTwo(3) to equal false"
