slug: is-prime
title: Prime Check
difficulty: easy
language: java
default_runtime_version: "26"
description_md: |
  ## What to do
  Implement `Solution.isPrime(int n)` — return `true` if `n` is prime (`n >= 2`).
  
  A prime number is an integer greater than `1` with no positive divisors other than `1` and itself.
  
  
  ## Examples
  - `1` → `false`
  - `2` → `true`
  - `17` → `true`
  ## Constraints
  - Implement only the required API; do not change test files.
  - Hidden tests may include additional edge cases beyond the examples.
  - Use the `Solution` class and static methods unless the starter specifies otherwise.
  
  ## Method to implement
  
  `Solution.isPrime(int n)`
gating_config:
  line_coverage_percent: 80
  checkstyle_max_errors: 0
limits:
  per_test_timeout_seconds: 10
starter_main_class: com.challenge.Solution
public_tests_meta:
  - name: "expect_isprime_1_to_equal_false"
    description: "Expect isPrime(1) to equal false"
  - name: "expect_isprime_2_to_equal_true"
    description: "Expect isPrime(2) to equal true"
  - name: "expect_isprime_17_to_equal_true"
    description: "Expect isPrime(17) to equal true"
