slug: longest-common-prefix
title: Longest Common Prefix
difficulty: easy
language: java
default_runtime_version: "26"
description_md: |
  ## What to do
  Implement `Solution.longestCommonPrefix(String[] strs)` for an array of strings.
  
  Read the task and signature carefully. Use the public examples to clarify edge cases before submitting.
  
  
  ## Examples
  - `{\"flower\",\"flow\",\"flight\"}` → `\"fl\"`
  - `{\"dog\",\"racecar\",\"car\"}` → `\"\"`
  ## Constraints
  - Implement only the required API; do not change test files.
  - Hidden tests may include additional edge cases beyond the examples.
  - Use the `Solution` class and static methods unless the starter specifies otherwise.
  
  ## Method to implement
  
  `Solution.longestCommonPrefix(String[] strs)`
gating_config:
  line_coverage_percent: 80
  checkstyle_max_errors: 0
limits:
  per_test_timeout_seconds: 10
starter_main_class: com.challenge.Solution
public_tests_meta:
  - name: "expect_longestcommonprefix_new_string_flower_flo"
    description: "Expect longestCommonPrefix(new String[] {\"flower\",\"flow\",\"flight\"}) to equal \"fl\""
  - name: "expect_longestcommonprefix_new_string_dog_raceca"
    description: "Expect longestCommonPrefix(new String[] {\"dog\",\"racecar\",\"car\"}) to equal \"\""
