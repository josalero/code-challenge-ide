slug: fibonacci-number
title: Fibonacci Number
difficulty: easy
language: java
default_runtime_version: "26"
description_md: |
  ## What to do
  Implement `Solution.fib(int n)` returning the n-th Fibonacci number with `fib(0)=0`, `fib(1)=1`.
  
  Use the standard definition: `F(0) = 0`, `F(1) = 1`, and `F(n) = F(n-1) + F(n-2)`.
  
  
  ## Examples
  - `0` → `0L`
  - `1` → `1L`
  - `5` → `5L`
  ## Constraints
  - Implement only the required API; do not change test files.
  - Hidden tests may include additional edge cases beyond the examples.
  - Use the `Solution` class and static methods unless the starter specifies otherwise.
  
  ## Method to implement
  
  `Solution.fib(int n)`
gating_config:
  line_coverage_percent: 80
  checkstyle_max_errors: 0
limits:
  per_test_timeout_seconds: 10
starter_main_class: com.challenge.Solution
public_tests_meta:
  - name: "expect_fib_0_to_equal_0l"
    description: "Expect fib(0) to equal 0L"
  - name: "expect_fib_1_to_equal_1l"
    description: "Expect fib(1) to equal 1L"
  - name: "expect_fib_5_to_equal_5l"
    description: "Expect fib(5) to equal 5L"
