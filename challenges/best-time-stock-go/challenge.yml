slug: best-time-stock-go
title: Best Time to Buy and Sell Stock (Go)
difficulty: easy
language: go
default_runtime_version: "1.23"
description_md: |
  ## What to do
  Return maximum profit from one buy and one sell; 0 if no profit possible.
  
  Each array element is a stock price on a given day. You may complete **at most one** transaction: choose one day to buy and a later day to sell. Return the maximum profit, or `0` if no profit is possible.
  
  
  ## Examples
  - `[7, 1, 5, 3, 6, 4]` → `5`
  - `[7, 6, 4, 3, 1]` → `0`
  ## Constraints
  - Implement only the required API; do not change test files.
  - Hidden tests may include additional edge cases beyond the examples.
  - Use package `solution` and the function signature from the starter file.
gating_config:
  line_coverage_percent: 80
  checkstyle_max_errors: 0
limits:
  per_test_timeout_seconds: 10
public_tests_meta:
  - name: "maxprofit_7_1_5_3_6_4_should_equal_5"
    description: "maxProfit([7, 1, 5, 3, 6, 4]) should equal 5"
  - name: "maxprofit_7_6_4_3_1_should_equal_0"
    description: "maxProfit([7, 6, 4, 3, 1]) should equal 0"
