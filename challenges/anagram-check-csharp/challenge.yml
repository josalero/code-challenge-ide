slug: anagram-check-csharp
title: Anagram Check (C#)
difficulty: easy
language: csharp
default_runtime_version: "8.0"
description_md: |
  Return true if `s` and `t` are anagrams (case-sensitive).
gating_config:
  line_coverage_percent: 80
  checkstyle_max_errors: 0
limits:
  per_test_timeout_seconds: 10
public_tests_meta:
  - name: "IsanagramAnagramNagaramShouldBeTrue"
    description: "isAnagram(\"anagram\", \"nagaram\") should be true"
  - name: "IsanagramRatCarShouldBeFalse"
    description: "isAnagram(\"rat\", \"car\") should be false"
