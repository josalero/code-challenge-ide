slug: anagram-check-csharp
title: Anagram Check (C#)
difficulty: easy
language: csharp
default_runtime_version: "8.0"
description_md: |
  ## What to do
  Return true if `s` and `t` are anagrams (case-sensitive).
  
  Two strings are anagrams if they contain the same characters with the same counts (comparison is case-sensitive unless stated otherwise).
  
  
  ## Examples
  - `\"anagram\", \"nagaram\"` → `true`
  - `\"rat\", \"car\"` → `false`
  ## Constraints
  - Implement only the required API; do not change test files.
  - Hidden tests may include additional edge cases beyond the examples.
  
  ## Method to implement
  
  `s`
gating_config:
  line_coverage_percent: 80
  checkstyle_max_errors: 0
limits:
  per_test_timeout_seconds: 10
public_tests_meta:
  - name: "IsanagramAnagramNagaramShouldBeTrue"
    description: "isAnagram(\"anagram\", \"nagaram\") should be true"
  - name: "IsanagramRatCarShouldBeFalse"
    description: "isAnagram(\"rat\", \"car\") should be false"
