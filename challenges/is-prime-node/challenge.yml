slug: is-prime-node
title: Prime Check (Node.js)
difficulty: easy
language: node
default_runtime_version: "22"
description_md: |
  Return true if n >= 2 is prime.
gating_config:
  line_coverage_percent: 80
  checkstyle_max_errors: 0
limits:
  per_test_timeout_seconds: 10
public_tests_meta:
  - name: "public_1"
    description: "isPrime(1) should be false"
  - name: "public_2"
    description: "isPrime(2) should be true"
  - name: "public_3"
    description: "isPrime(17) should be true"
