slug: max-subarray-csharp
title: Maximum Subarray (C#)
difficulty: medium
language: csharp
default_runtime_version: "8.0"
description_md: |
  ## What to do
  Return the largest sum of any contiguous subarray (Kadane).
  
  Find the contiguous subarray with the largest sum and return that sum (Kadane's algorithm is the classic approach).
  
  
  ## Examples
  - `[-2, 1, -3, 4, -1, 2, 1, -4, 3]` → `6`
  - `[1]` → `1`
  ## Constraints
  - Implement only the required API; do not change test files.
  - Hidden tests may include additional edge cases beyond the examples.
  - Aim for an efficient solution; brute force may time out on large hidden inputs.
gating_config:
  line_coverage_percent: 80
  checkstyle_max_errors: 0
limits:
  per_test_timeout_seconds: 10
public_tests_meta:
  - name: "Maxsubarray213412143ShouldEqual6"
    description: "maxSubArray([-2, 1, -3, 4, -1, 2, 1, -4, 3]) should equal 6"
  - name: "Maxsubarray1ShouldEqual1"
    description: "maxSubArray([1]) should equal 1"
