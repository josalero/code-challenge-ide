slug: palindrome-check
title: Palindrome Check
difficulty: easy
language: java
default_runtime_version: "26"
description_md: |
  Implement `Solution.isPalindrome(String input)` returning `true` when the string reads the same forward and backward.

  Compare characters exactly (case-sensitive).
gating_config:
  line_coverage_percent: 80
  checkstyle_max_errors: 0
limits:
  per_test_timeout_seconds: 10
  session_duration_minutes: 30
starter_main_class: com.challenge.Solution
public_tests_meta:
  - name: "empty_string_is_palindrome"
    description: "Empty String Is Palindrome"
  - name: "single_character_is_palindrome"
    description: "Single Character Is Palindrome"
  - name: "racecar_is_palindrome"
    description: "Racecar Is Palindrome"
  - name: "hello_is_not_palindrome"
    description: "Hello Is Not Palindrome"
