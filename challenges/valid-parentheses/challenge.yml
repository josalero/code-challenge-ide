slug: valid-parentheses
title: Valid Parentheses
difficulty: easy
language: java
default_runtime_version: "26"
description_md: |
  Implement `Solution.isValid(String s)` to determine whether a string containing only `()`, `{}`, and `[]` is properly balanced and nested.

  An empty string is valid.
gating_config:
  line_coverage_percent: 80
  checkstyle_max_errors: 0
limits:
  per_test_timeout_seconds: 10
starter_main_class: com.challenge.Solution
public_tests_meta:
  - name: "simple_pair_is_valid"
    description: "Simple Pair Is Valid"
  - name: "mixed_brackets_are_valid"
    description: "Mixed Brackets Are Valid"
  - name: "mismatched_closing_is_invalid"
    description: "Mismatched Closing Is Invalid"
  - name: "wrong_order_is_invalid"
    description: "Wrong Order Is Invalid"
