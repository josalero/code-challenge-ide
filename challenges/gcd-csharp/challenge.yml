  per_test_timeout_seconds: 10
  session_duration_minutes: 30
public_tests_meta:
  - name: "Gcd5424ShouldEqual6"
    description: "GCD(54, 24) should equal 6"
  - name: "Gcd1713ShouldEqual1"
