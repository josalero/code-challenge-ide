slug: flatten-nested-list
title: Flatten Nested List
difficulty: medium
language: python
default_runtime_version: "3.12"
description_md: |
  ## What to do
  Flatten a list that may contain integers or nested lists of integers (one level deep).
  
  Read the task and signature carefully. Use the public examples to clarify edge cases before submitting.
  
  ## Examples
  - `[1, [2, 3], 4]` → `[1,2,3,4]`
  - `[]` → `[]`
  
  ## Constraints
  - Implement only the required API; do not change test files.
  - Hidden tests may include additional edge cases beyond the examples.
  - Put your solution in `starter/solution.py` with the expected function names.
  - Aim for an efficient solution; brute force may time out on large hidden inputs.
gating_config:
  line_coverage_percent: 80
limits:
  per_test_timeout_seconds: 10
  session_duration_minutes: 60
starter_main_class: solution
public_tests_meta:
  - name: "test_flat"
    description: "Expect flatten([1, [2, 3], 4]) to equal [1, 2, 3, 4]"
  - name: "test_empty"
    description: "Expect flatten([]) to equal []"
