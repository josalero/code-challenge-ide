slug: remove-duplicates-sorted
title: Remove Duplicates from Sorted Array
difficulty: easy
language: java
default_runtime_version: "26"
description_md: |
  ## What to do
  Remove duplicates in-place from sorted `nums`. Return count of unique elements. `Solution.removeDuplicates(int[] nums)`.
  
  Return `true` if any value appears at least twice in the array.
  
  ## Examples
  - `a` → `2`
  
  ## Constraints
  - Implement only the required API; do not change test files.
  - Hidden tests may include additional edge cases beyond the examples.
  - Use the `Solution` class and static methods unless the starter specifies otherwise.
  - Arrays may be empty unless examples show otherwise.
  
  ## Method to implement
  
  `Solution.removeDuplicates(int[] nums)`
gating_config:
  line_coverage_percent: 80
  checkstyle_max_errors: 0
limits:
  per_test_timeout_seconds: 10
  session_duration_minutes: 30
starter_main_class: com.challenge.Solution
public_tests_meta:
  - name: "expect_removeduplicates_a_to_equal_2"
    description: "Expect removeDuplicates(a) to equal 2"
