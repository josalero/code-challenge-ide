slug: valid-palindrome-cpp
title: Valid Palindrome (C++)
difficulty: easy
language: cpp
default_runtime_version: "20"
description_md: |
  ## What to do
  After removing non-alphanumeric characters and lowercasing, return whether the string is a palindrome.
  
  Consider only alphanumeric characters and ignore case when checking palindrome property.
  
  
  ## Examples
  - `\"A man, a plan, a can…\"` → `true`
  - `\"race a car\"` → `false`
  ## Constraints
  - Implement only the required API; do not change test files.
  - Hidden tests may include additional edge cases beyond the examples.
gating_config:
  line_coverage_percent: 80
  checkstyle_max_errors: 0
limits:
  per_test_timeout_seconds: 10
public_tests_meta:
  - name: "ispalindrome_a_man_a_plan_a_can_should_be_true"
    description: "isPalindrome(\"A man, a plan, a can…\") should be true"
  - name: "ispalindrome_race_a_car_should_be_false"
    description: "isPalindrome(\"race a car\") should be false"
