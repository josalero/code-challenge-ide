slug: sqrt-integer
title: Sqrt(x)
difficulty: easy
language: java
default_runtime_version: "26"
description_md: |
  ## What to do
  Implement `Solution.mySqrt(int x)` returning the integer square root (floor).
  
  Return the integer part of the square root of `x` (truncate toward zero).
  
  ## Examples
  - `8` → `2`
  - `0` → `0`
  
  ## Constraints
  - Implement only the required API; do not change test files.
  - Hidden tests may include additional edge cases beyond the examples.
  - Use the `Solution` class and static methods unless the starter specifies otherwise.
  
  ## Method to implement
  
  `Solution.mySqrt(int x)`
gating_config:
  line_coverage_percent: 80
  checkstyle_max_errors: 0
limits:
  per_test_timeout_seconds: 10
  session_duration_minutes: 30
starter_main_class: com.challenge.Solution
public_tests_meta:
  - name: "expect_mysqrt_8_to_equal_2"
    description: "Expect mySqrt(8) to equal 2"
  - name: "expect_mysqrt_0_to_equal_0"
    description: "Expect mySqrt(0) to equal 0"
