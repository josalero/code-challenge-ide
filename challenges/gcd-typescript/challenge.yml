  per_test_timeout_seconds: 10
  session_duration_minutes: 30
public_tests_meta:
  - name: "gcd_54_24_should_equal_6"
    description: "GCD(54, 24) should equal 6"
  - name: "gcd_17_13_should_equal_1"
    description: "GCD(17, 13) should equal 1"
  - name: "gcd_25_15_should_equal_5"
    description: "GCD(25, 15) should equal 5"
