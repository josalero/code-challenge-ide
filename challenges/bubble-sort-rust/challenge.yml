slug: bubble-sort-rust
title: Bubble Sort (Rust)
difficulty: easy
language: rust
default_runtime_version: "1.84"
description_md: |
  ## What to do
  Return a new array sorted ascending using bubble sort (stable).
  
  Return a **new** array sorted in ascending order using the bubble sort algorithm (do not mutate the input unless the API says otherwise).
  
  ## Examples
  - `[3, 1, 2]` → `[1,2,3]`
  - `[1]` → `[1]`
  
  ## Constraints
  - Implement only the required API; do not change test files.
  - Hidden tests may include additional edge cases beyond the examples.
gating_config:
  line_coverage_percent: 80
  checkstyle_max_errors: 0
limits:
  per_test_timeout_seconds: 10
  session_duration_minutes: 30
public_tests_meta:
  - name: "bubblesort_3_1_2_should_return_1_2_3"
    description: "bubbleSort([3, 1, 2]) should return [1, 2, 3]"
  - name: "bubblesort_1_should_return_1"
    description: "bubbleSort([1]) should return [1]"
