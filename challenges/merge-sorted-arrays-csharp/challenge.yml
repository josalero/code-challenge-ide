slug: merge-sorted-arrays-csharp
title: Merge Sorted Arrays (C#)
difficulty: easy
language: csharp
default_runtime_version: "8.0"
description_md: |
  ## What to do
  Merge two sorted integer arrays into one sorted array.
  
  Both input arrays are sorted in non-decreasing order. Return a new sorted array containing all elements from both inputs.
  
  
  ## Examples
  - `[1, 2, 3], [2, 5, 6]` → `[1,2,2,3,5,6]`
  - `[], [1]` → `[1]`
  ## Constraints
  - Implement only the required API; do not change test files.
  - Hidden tests may include additional edge cases beyond the examples.
gating_config:
  line_coverage_percent: 80
  checkstyle_max_errors: 0
limits:
  per_test_timeout_seconds: 10
public_tests_meta:
  - name: "Mergesorted123256ShouldReturn12235"
    description: "mergeSorted([1, 2, 3], [2, 5, 6]) should return [1, 2, 2, 3, 5, 6]"
  - name: "Mergesorted1ShouldReturn1"
    description: "mergeSorted([], [1]) should return [1]"
