slug: max-subarray
title: Maximum Subarray
difficulty: medium
language: java
default_runtime_version: "26"
description_md: |
  ## What to do
  Implement `Solution.maxSubArray(int[] nums)` returning the largest sum of any contiguous subarray (Kadane).
  
  Find the contiguous subarray with the largest sum and return that sum (Kadane's algorithm is the classic approach).
  
  
  ## Examples
  - `[-2, 1, -3, 4, -1, 2, 1, -5, 4]` → `6`
  - `[1]` → `1`
  ## Constraints
  - Implement only the required API; do not change test files.
  - Hidden tests may include additional edge cases beyond the examples.
  - Use the `Solution` class and static methods unless the starter specifies otherwise.
  - Aim for an efficient solution; brute force may time out on large hidden inputs.
  - Arrays may be empty unless examples show otherwise.
  
  ## Method to implement
  
  `Solution.maxSubArray(int[] nums)`
gating_config:
  line_coverage_percent: 80
  checkstyle_max_errors: 0
limits:
  per_test_timeout_seconds: 10
starter_main_class: com.challenge.Solution
public_tests_meta:
  - name: "expect_maxsubarray_new_int_2_1_3_4_1_2_1_5_4_to_"
    description: "Expect maxSubArray(new int[] {-2,1,-3,4,-1,2,1,-5,4}) to equal 6"
  - name: "expect_maxsubarray_new_int_1_to_equal_1"
    description: "Expect maxSubArray(new int[] {1}) to equal 1"
