slug: sql-select-all-employees
title: List all employees
difficulty: easy
language: sql
default_runtime_version: "17"
description_md: |
  ## What to do
  Return every employee's id and name, ordered by id ascending.
  
  Each challenge seeds a small PostgreSQL schema under `setup/schema.sql`. Public checks run on **Run**; hidden checks validate more result shapes on **Submit**.
  
  ## Public checks (reference)
  - `Your SQL query` → `6 rows`
  
  ## Constraints
  - Implement only the required API; do not change test files.
  - Hidden tests may include additional edge cases beyond the examples.
  - Write your query in `starter/solution.sql`; the runner applies `setup/schema.sql` before each check.
  - Result sets are compared to expected rows (column order must match unless noted).
gating_config:
