slug: two-sum
title: Two Sum
difficulty: easy
language: java
default_runtime_version: "26"
description_md: |
  Given an integer array `nums` and an integer `target`, implement `Solution.twoSum(int[] nums, int target)`.

  Return the **0-based indices** of the two distinct elements that sum to `target`. Exactly one valid pair exists; return indices in ascending order.
gating_config:
  line_coverage_percent: 80
  checkstyle_max_errors: 0
limits:
  per_test_timeout_seconds: 10
starter_main_class: com.challenge.Solution
public_tests_meta:
  - name: "expect_twosum_new_int_2_7_11_15_9_to_return_0_1"
    description: "Expect twoSum(new int[] {2, 7, 11, 15}, 9) to return [0, 1]"
  - name: "expect_twosum_new_int_3_2_4_6_to_return_1_2"
    description: "Expect twoSum(new int[] {3, 2, 4}, 6) to return [1, 2]"
  - name: "expect_twosum_new_int_3_3_6_to_return_0_1"
    description: "Expect twoSum(new int[] {3, 3}, 6) to return [0, 1]"
