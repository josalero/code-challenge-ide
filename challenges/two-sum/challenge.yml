slug: two-sum
title: Two Sum
difficulty: easy
language: java
default_runtime_version: "26"
description_md: |
  ## What to do
  Given an integer array `nums` and an integer `target`, implement `Solution.twoSum(int[] nums, int target)`.
  
  Return the **0-based indices** of the two distinct elements that sum to `target`. Exactly one valid pair exists; return indices in ascending order.
  
  You are given an array of integers and a target sum. Find **two different indices** whose values add up to the target. Exactly one valid pair exists.
  
  
  ## Examples
  - `[2, 7, 11, 15], 9` → `[0,1]`
  - `[3, 2, 4], 6` → `[1,2]`
  - `[3, 3], 6` → `[0,1]`
  ## Constraints
  - Implement only the required API; do not change test files.
  - Hidden tests may include additional edge cases beyond the examples.
  - Use the `Solution` class and static methods unless the starter specifies otherwise.
  - Arrays may be empty unless examples show otherwise.
  
  ## Method to implement
  
  `Solution.twoSum(int[] nums, int target)`
gating_config:
  line_coverage_percent: 80
  checkstyle_max_errors: 0
limits:
  per_test_timeout_seconds: 10
  session_duration_minutes: 30
starter_main_class: com.challenge.Solution
