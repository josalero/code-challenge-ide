slug: factorial
title: Factorial
difficulty: easy
language: java
default_runtime_version: "26"
description_md: |
  ## What to do
  Implement `Solution.factorial(int n)` returning `n!` for `n >= 0`. For `n == 0` return `1`.
  
  By definition, `0! = 1`. For `n > 0`, multiply all integers from `1` through `n`.
  
  
  ## Examples
  - `0` → `1L`
  - `5` → `120L`
  - `1` → `1L`
  ## Constraints
  - Implement only the required API; do not change test files.
  - Hidden tests may include additional edge cases beyond the examples.
  - Use the `Solution` class and static methods unless the starter specifies otherwise.
  
  ## Method to implement
  
  `Solution.factorial(int n)`
gating_config:
  line_coverage_percent: 80
  checkstyle_max_errors: 0
limits:
  per_test_timeout_seconds: 10
starter_main_class: com.challenge.Solution
public_tests_meta:
  - name: "expect_factorial_0_to_equal_1l"
    description: "Expect factorial(0) to equal 1L"
  - name: "expect_factorial_5_to_equal_120l"
    description: "Expect factorial(5) to equal 120L"
  - name: "expect_factorial_1_to_equal_1l"
    description: "Expect factorial(1) to equal 1L"
