slug: happy-number
title: Happy Number
difficulty: easy
language: java
default_runtime_version: "26"
description_md: |
  ## What to do
  Replace `n` with sum of squares of its digits until `1` (happy) or loop (not). `Solution.isHappy(int n)`.
  
  Read the task and signature carefully. Use the public examples to clarify edge cases before submitting.
  
  ## Examples
  - `19` → `true`
  - `2` → `false`
  
  ## Constraints
  - Implement only the required API; do not change test files.
  - Hidden tests may include additional edge cases beyond the examples.
  - Use the `Solution` class and static methods unless the starter specifies otherwise.
  
  ## Method to implement
  
  `Solution.isHappy(int n)`
gating_config:
  line_coverage_percent: 80
  checkstyle_max_errors: 0
limits:
  per_test_timeout_seconds: 10
  session_duration_minutes: 30
starter_main_class: com.challenge.Solution
public_tests_meta:
  - name: "expect_ishappy_19_to_equal_true"
    description: "Expect isHappy(19) to equal true"
  - name: "expect_ishappy_2_to_equal_false"
    description: "Expect isHappy(2) to equal false"
