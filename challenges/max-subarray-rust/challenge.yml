slug: max-subarray-rust
title: Maximum Subarray (Rust)
difficulty: medium
language: rust
default_runtime_version: "1.84"
description_md: |
  Return the largest sum of any contiguous subarray (Kadane).
gating_config:
  line_coverage_percent: 80
  checkstyle_max_errors: 0
limits:
  per_test_timeout_seconds: 10
public_tests_meta:
  - name: "maxsubarray_2_1_3_4_1_2_1_4_3_should_equal_6"
    description: "maxSubArray([-2, 1, -3, 4, -1, 2, 1, -4, 3]) should equal 6"
  - name: "maxsubarray_1_should_equal_1"
    description: "maxSubArray([1]) should equal 1"
