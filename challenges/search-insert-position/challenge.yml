slug: search-insert-position
title: Search Insert Position
difficulty: easy
language: java
default_runtime_version: "26"
description_md: |
  ## What to do
  Sorted array without duplicates. Return index if `target` found else insert position. `Solution.searchInsert(int[] nums, int target)`.
  
  Search the structure or array as described and return the required index or boolean result.
  
  ## Examples
  - `[1, 3, 5, 6], 5` → `2`
  - `[1, 3, 5, 6], 2` → `1`
  
  ## Constraints
  - Implement only the required API; do not change test files.
  - Hidden tests may include additional edge cases beyond the examples.
  - Use the `Solution` class and static methods unless the starter specifies otherwise.
  - Arrays may be empty unless examples show otherwise.
  
  ## Method to implement
  
  `Solution.searchInsert(int[] nums, int target)`
gating_config:
  line_coverage_percent: 80
  checkstyle_max_errors: 0
limits:
  per_test_timeout_seconds: 10
  session_duration_minutes: 30
starter_main_class: com.challenge.Solution
public_tests_meta:
  - name: "expect_searchinsert_new_int_1_3_5_6_5_to_equal_2"
    description: "Expect searchInsert(new int[] {1,3,5,6}, 5) to equal 2"
  - name: "expect_searchinsert_new_int_1_3_5_6_2_to_equal_1"
    description: "Expect searchInsert(new int[] {1,3,5,6}, 2) to equal 1"
