slug: missing-number
title: Missing Number
difficulty: easy
language: java
default_runtime_version: "26"
description_md: |
  ## What to do
  Array `nums` contains `n` distinct values in `[0, n]`. One value is missing. Return it.
  
  The array `nums` contains `n` distinct values taken from the range `[0, n]`. Exactly one number from that range is missing.
  
  ## Examples
  - `[3, 0, 1]` → `2`
  - `[0]` → `1`
  
  ## Constraints
  - Implement only the required API; do not change test files.
  - Hidden tests may include additional edge cases beyond the examples.
  - Use the `Solution` class and static methods unless the starter specifies otherwise.
  
  ## Method to implement
  
  `nums`
gating_config:
  line_coverage_percent: 80
  checkstyle_max_errors: 0
limits:
  per_test_timeout_seconds: 10
  session_duration_minutes: 30
starter_main_class: com.challenge.Solution
public_tests_meta:
  - name: "expect_missingnumber_new_int_3_0_1_to_equal_2"
    description: "Expect missingNumber(new int[] {3,0,1}) to equal 2"
  - name: "expect_missingnumber_new_int_0_to_equal_1"
    description: "Expect missingNumber(new int[] {0}) to equal 1"
