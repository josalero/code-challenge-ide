slug: climbing-stairs
title: Climbing Stairs
difficulty: easy
language: java
default_runtime_version: "26"
description_md: |
  ## What to do
  You can climb 1 or 2 steps. Implement `Solution.climbStairs(int n)` — number of distinct ways to reach step `n`.
  
  You can climb 1 or 2 steps at a time. Count how many distinct ways you can reach step `n`.
  
  ## Examples
  - `2` → `2`
  - `3` → `3`
  
  ## Constraints
  - Implement only the required API; do not change test files.
  - Hidden tests may include additional edge cases beyond the examples.
  - Use the `Solution` class and static methods unless the starter specifies otherwise.
  
  ## Method to implement
  
  `Solution.climbStairs(int n)`
gating_config:
  line_coverage_percent: 80
  checkstyle_max_errors: 0
limits:
  per_test_timeout_seconds: 10
  session_duration_minutes: 30
starter_main_class: com.challenge.Solution
public_tests_meta:
  - name: "expect_climbstairs_2_to_equal_2"
    description: "Expect climbStairs(2) to equal 2"
  - name: "expect_climbstairs_3_to_equal_3"
    description: "Expect climbStairs(3) to equal 3"
