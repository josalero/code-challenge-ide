slug: valid-anagram
title: Valid Anagram
difficulty: easy
language: java
default_runtime_version: "26"
description_md: |
  ## What to do
  Implement `Solution.isAnagram(String s, String t)` — `true` if `t` is an anagram of `s`.
  
  Given two strings `s` and `t`, return whether `t` is an anagram of `s`.
  
  ## Examples
  - `"anagram", "nagaram"` → `true`
  - `"rat", "car"` → `false`
  
  ## Constraints
  - Implement only the required API; do not change test files.
  - Hidden tests may include additional edge cases beyond the examples.
  - Use the `Solution` class and static methods unless the starter specifies otherwise.
  
  ## Method to implement
  
  `Solution.isAnagram(String s, String t)`
gating_config:
  line_coverage_percent: 80
  checkstyle_max_errors: 0
limits:
  per_test_timeout_seconds: 10
  session_duration_minutes: 30
starter_main_class: com.challenge.Solution
public_tests_meta:
  - name: "expect_isanagram_anagram_nagaram_to_equal_true"
    description: "Expect isAnagram(\"anagram\", \"nagaram\") to equal true"
  - name: "expect_isanagram_rat_car_to_equal_false"
    description: "Expect isAnagram(\"rat\", \"car\") to equal false"
