slug: even-odd-partition
title: Even Odd Partition
difficulty: easy
language: python
default_runtime_version: "3.12"
description_md: |
  ## What to do
  Return tuple `(evens, odds)` preserving order within each group.
  
  Read the task and signature carefully. Use the public examples to clarify edge cases before submitting.
  
  ## Examples
  - `[1, 2, 3, 4]` → `([2, 4], [1, 3])`
  - `[]` → `([], [])`
  
  ## Constraints
  - Implement only the required API; do not change test files.
  - Hidden tests may include additional edge cases beyond the examples.
  - Put your solution in `starter/solution.py` with the expected function names.
  
  ## Method to implement
  
  `(evens, odds)`
gating_config:
  line_coverage_percent: 80
limits:
  per_test_timeout_seconds: 10
  session_duration_minutes: 30
starter_main_class: solution
public_tests_meta:
  - name: "test_mix"
    description: "Expect partition_even_odd([1, 2, 3, 4]) to equal ([2, 4], [1, 3])"
  - name: "test_empty"
    description: "Expect partition_even_odd([]) to equal ([], [])"
