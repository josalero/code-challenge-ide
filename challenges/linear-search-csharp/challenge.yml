slug: linear-search-csharp
title: Linear Search (C#)
difficulty: easy
language: csharp
default_runtime_version: "8.0"
description_md: |
  ## What to do
  Return index of target in nums, or -1.
  
  Return the index of `target` in the array, or `-1` if the value does not occur.
  
  ## Examples
  - `[2, 3, 4], 3` → `index 1`
  - `[1, 2], 5` → `index -1`
  
  ## Constraints
  - Implement only the required API; do not change test files.
  - Hidden tests may include additional edge cases beyond the examples.
gating_config:
  line_coverage_percent: 80
  checkstyle_max_errors: 0
limits:
  per_test_timeout_seconds: 10
  session_duration_minutes: 30
public_tests_meta:
  - name: "Linearsearch2343ShouldReturnIndex1"
    description: "linearSearch([2, 3, 4], 3) should return index 1"
  - name: "Linearsearch125ShouldReturnIndex1"
