slug: two-sum-rust
title: Two Sum (Rust)
difficulty: easy
language: rust
default_runtime_version: "1.84"
description_md: |
  ## What to do
  Return 0-based indices of two distinct elements that sum to `target` (exactly one solution).
  
  You are given an array of integers and a target sum. Find **two different indices** whose values add up to the target. Exactly one valid pair exists.
  
  
  ## Examples
  - `[2, 7, 11, 15], 9` → `[0,1]`
  - `[3, 2, 4], 6` → `[1,2]`
  ## Constraints
  - Implement only the required API; do not change test files.
  - Hidden tests may include additional edge cases beyond the examples.
  
  ## Method to implement
  
  `target`
gating_config:
  line_coverage_percent: 80
  checkstyle_max_errors: 0
limits:
  per_test_timeout_seconds: 10
public_tests_meta:
  - name: "twosum_2_7_11_15_9_should_return_0_1"
    description: "twoSum([2, 7, 11, 15], 9) should return [0, 1]"
  - name: "twosum_3_2_4_6_should_return_1_2"
    description: "twoSum([3, 2, 4], 6) should return [1, 2]"
