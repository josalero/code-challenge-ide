  ## What to do
  Standalone `TruncatePipe` — `transform(value, limit)` returns value if short else `value.slice(0, limit) + '...'`.
  
  Implement the component or module described above so it passes the Vitest tests. Focus on rendering, user interaction, and predictable state — not routing or backend APIs.
  
