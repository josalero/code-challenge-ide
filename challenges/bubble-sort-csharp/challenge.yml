slug: bubble-sort-csharp
title: Bubble Sort (C#)
difficulty: easy
language: csharp
default_runtime_version: "8.0"
description_md: |
  ## What to do
  Return a new array sorted ascending using bubble sort (stable).
  
  Return a **new** array sorted in ascending order using the bubble sort algorithm (do not mutate the input unless the API says otherwise).
  
  
  ## Examples
  - `[3, 1, 2]` → `[1,2,3]`
  - `[1]` → `[1]`
  ## Constraints
  - Implement only the required API; do not change test files.
  - Hidden tests may include additional edge cases beyond the examples.
gating_config:
  line_coverage_percent: 80
  checkstyle_max_errors: 0
limits:
  per_test_timeout_seconds: 10
public_tests_meta:
  - name: "Bubblesort312ShouldReturn123"
    description: "bubbleSort([3, 1, 2]) should return [1, 2, 3]"
  - name: "Bubblesort1ShouldReturn1"
