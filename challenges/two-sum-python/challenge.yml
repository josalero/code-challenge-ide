slug: two-sum-python
title: Two Sum (Python)
difficulty: easy
language: python
default_runtime_version: "3.12"
description_md: |
  ## What to do
  Return indices of two numbers that add to `target` (exactly one solution, use first valid pair).
  
  You are given an array of integers and a target sum. Find **two different indices** whose values add up to the target. Exactly one valid pair exists.
  
  ## Examples
  - `[2, 7, 11, 15], 9` → `[0,1]`
  - `[3, 2, 4], 6` → `[1,2]`
  
  ## Constraints
  - Implement only the required API; do not change test files.
  - Hidden tests may include additional edge cases beyond the examples.
  - Put your solution in `starter/solution.py` with the expected function names.
  
  ## Method to implement
  
  `target`
gating_config:
  line_coverage_percent: 80
limits:
  per_test_timeout_seconds: 10
  session_duration_minutes: 30
starter_main_class: solution
public_tests_meta:
  - name: "test_basic"
    description: "Expect two_sum([2, 7, 11, 15], 9) to equal [0, 1]"
  - name: "test_later"
    description: "Expect two_sum([3, 2, 4], 6) to equal [1, 2]"
