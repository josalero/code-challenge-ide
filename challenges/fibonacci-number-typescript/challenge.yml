slug: fibonacci-number-typescript
title: Fibonacci Number (TypeScript)
difficulty: easy
language: typescript
default_runtime_version: "5.7"
description_md: |
  ## What to do
  Return the n-th Fibonacci number (fib(0)=0, fib(1)=1).
  
  Use the standard definition: `F(0) = 0`, `F(1) = 1`, and `F(n) = F(n-1) + F(n-2)`.
  
  
  ## Examples
  - `0` → `0`
  - `1` → `1`
  - `5` → `5`
  ## Constraints
  - Implement only the required API; do not change test files.
  - Hidden tests may include additional edge cases beyond the examples.
gating_config:
  line_coverage_percent: 80
  checkstyle_max_errors: 0
limits:
  per_test_timeout_seconds: 10
public_tests_meta:
  - name: "fibonacci_0_should_equal_0"
    description: "fibonacci(0) should equal 0"
  - name: "fibonacci_1_should_equal_1"
    description: "fibonacci(1) should equal 1"
  - name: "fibonacci_5_should_equal_5"
    description: "fibonacci(5) should equal 5"
