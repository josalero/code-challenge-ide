# Coolify — build everything on the VPS (no GHCR pull).
#
# Coolify UI:
#   Type: Docker Compose
#   Base directory: repository root (challenges/, runners/, be/, fe/)
#   Docker Compose file: docker-compose.coolify.yml
#   Build: enabled — Coolify builds api, fe, runner, and LSP images from this file.
#
# Runner/LSP images are one-shot build services. They exit 0 after /bin/true; the API waits for
# them so Ops/Run tests see the same image inventory as local docker-compose.yml.
# Expose in Coolify: service `code-lab-fe`, container port 80 (HTTPS proxy).
# Env: cp .env.coolify.example .env — see docs/coolify.md

name: code-training-lab

networks:
  code-lab:
    name: code-lab
  coolify:
    external: true

# FE Caddyfile is baked in the image and proxies /api/* to code-lab-api.

x-runner-build-only: &runner-build-only
  restart: "no"
  entrypoint: ["/bin/true"]
  networks:
    - code-lab
    - coolify

services:
  code-lab-postgres:
    image: postgres:17
    restart: unless-stopped
    networks:
      - code-lab
      - coolify
    environment:
      POSTGRES_USER: ${PG_USER:-postgres}
      POSTGRES_PASSWORD: ${PG_PASSWORD:?Set PG_PASSWORD}
      POSTGRES_DB: ${PG_DB:-code_training_lab}
    volumes:
      - ctl-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-postgres} -d ${PG_DB:-code_training_lab}"]
      interval: 5s
      timeout: 5s
      retries: 10

  code-lab-rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: unless-stopped
    networks:
      - code-lab
      - coolify
    environment:
      RABBITMQ_DEFAULT_USER: ${RMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RMQ_PASSWORD:?Set RMQ_PASSWORD}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  code-lab-api:
    build:
      context: .
      dockerfile: be/Dockerfile
    image: ${CTL_API_IMAGE:-code-challenge-ide-be:local}
    restart: unless-stopped
    networks:
      - code-lab
      - coolify
    environment:
      SERVER_PORT: 8080
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-production}
      SPRING_DATASOURCE_URL: jdbc:postgresql://code-lab-postgres:5432/${PG_DB:-code_training_lab}
      SPRING_DATASOURCE_USERNAME: ${PG_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${PG_PASSWORD}
      SPRING_RABBITMQ_HOST: code-lab-rabbitmq
      SPRING_RABBITMQ_USERNAME: ${RMQ_USER:-guest}
      SPRING_RABBITMQ_PASSWORD: ${RMQ_PASSWORD}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET}
      REGISTRATION_ENABLED: ${REGISTRATION_ENABLED:-true}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      CTL_CHALLENGES_PATH: /challenges
      CTL_DOCKER_ENABLED: "true"
      RUNNER_JAVA_25_IMAGE: ${RUNNER_JAVA_25_IMAGE:-code-challenge-ide-runner-java-25:local}
      RUNNER_JAVA_26_IMAGE: ${RUNNER_JAVA_26_IMAGE:-code-challenge-ide-runner-java-26:local}
      RUNNER_PYTHON_312_IMAGE: ${RUNNER_PYTHON_312_IMAGE:-code-challenge-ide-runner-python-312:local}
      RUNNER_GO_123_IMAGE: ${RUNNER_GO_123_IMAGE:-code-challenge-ide-runner-go-123:local}
      RUNNER_NODE_22_IMAGE: ${RUNNER_NODE_22_IMAGE:-code-challenge-ide-runner-node-22:local}
      RUNNER_DOTNET_8_IMAGE: ${RUNNER_DOTNET_8_IMAGE:-code-challenge-ide-runner-dotnet-8:local}
      RUNNER_TYPESCRIPT_57_IMAGE: ${RUNNER_TYPESCRIPT_57_IMAGE:-code-challenge-ide-runner-typescript-57:local}
      RUNNER_RUST_184_IMAGE: ${RUNNER_RUST_184_IMAGE:-code-challenge-ide-runner-rust-184:local}
      RUNNER_CPP_20_IMAGE: ${RUNNER_CPP_20_IMAGE:-code-challenge-ide-runner-cpp-20:local}
      RUNNER_REACT_19_IMAGE: ${RUNNER_REACT_19_IMAGE:-code-challenge-ide-runner-react-19:local}
      RUNNER_VUE_35_IMAGE: ${RUNNER_VUE_35_IMAGE:-code-challenge-ide-runner-vue-35:local}
      RUNNER_ANGULAR_19_IMAGE: ${RUNNER_ANGULAR_19_IMAGE:-code-challenge-ide-runner-angular-19:local}
      RUNNER_POSTGRES_17_IMAGE: ${RUNNER_POSTGRES_17_IMAGE:-code-challenge-ide-runner-postgres-17:local}
      RUNNER_MAVEN_CACHE_VOLUME: ${RUNNER_MAVEN_CACHE_VOLUME:-ctl-runner-m2-cache}
      RUNNER_POOL_ENABLED: ${RUNNER_POOL_ENABLED:-true}
      RUNNER_POOL_WARM_ON_STARTUP: ${RUNNER_POOL_WARM_ON_STARTUP:-false}
      CTL_OPS_DATA_DIR: /data/ctl-ops
      DOCKER_GID: ${DOCKER_GID:?Set DOCKER_GID to the host docker.sock group id}
      LSP_JAVA_IMAGE: ${LSP_JAVA_IMAGE:-code-challenge-ide-lsp-java:local}
      LSP_PYTHON_IMAGE: ${LSP_PYTHON_IMAGE:-code-challenge-ide-lsp-python:local}
      LSP_GO_IMAGE: ${LSP_GO_IMAGE:-code-challenge-ide-lsp-go:local}
      LSP_TYPESCRIPT_IMAGE: ${LSP_TYPESCRIPT_IMAGE:-code-challenge-ide-lsp-typescript:local}
      LSP_DOTNET_IMAGE: ${LSP_DOTNET_IMAGE:-code-challenge-ide-lsp-dotnet:local}
      LSP_RUST_IMAGE: ${LSP_RUST_IMAGE:-code-challenge-ide-lsp-rust:local}
      LSP_CPP_IMAGE: ${LSP_CPP_IMAGE:-code-challenge-ide-lsp-cpp:local}
      CTL_LSP_ENABLED: ${CTL_LSP_ENABLED:-true}
      AI_PROVIDER: ${AI_PROVIDER:-openrouter}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-openai/gpt-4o-mini}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5-coder}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ctl-ops-data:/data/ctl-ops
    group_add:
      - "${DOCKER_GID:?Set DOCKER_GID to the host docker.sock group id}"
    depends_on:
      code-lab-postgres:
        condition: service_healthy
      code-lab-rabbitmq:
        condition: service_healthy
      runner-java-25:
        condition: service_completed_successfully
      runner-java-26:
        condition: service_completed_successfully
      runner-python-312:
        condition: service_completed_successfully
      runner-go-123:
        condition: service_completed_successfully
      runner-node-22:
        condition: service_completed_successfully
      runner-dotnet-8:
        condition: service_completed_successfully
      runner-typescript-57:
        condition: service_completed_successfully
      runner-rust-184:
        condition: service_completed_successfully
      runner-cpp-20:
        condition: service_completed_successfully
      runner-react-19:
        condition: service_completed_successfully
      runner-vue-35:
        condition: service_completed_successfully
      runner-angular-19:
        condition: service_completed_successfully
      runner-postgres-17:
        condition: service_completed_successfully
      runner-lsp-java:
        condition: service_completed_successfully
      runner-lsp-python:
        condition: service_completed_successfully
      runner-lsp-go:
        condition: service_completed_successfully
      runner-lsp-typescript:
        condition: service_completed_successfully
      runner-lsp-dotnet:
        condition: service_completed_successfully
      runner-lsp-rust:
        condition: service_completed_successfully
      runner-lsp-cpp:
        condition: service_completed_successfully
      runner-m2-warm:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health/readiness || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 180s
      retries: 5
    extra_hosts:
      - "host.docker.internal:host-gateway"

  code-lab-fe:
    build:
      context: ./fe
      dockerfile: Dockerfile
    image: ${CTL_FE_IMAGE:-code-challenge-ide-fe:local}
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - code-lab
      - coolify
    depends_on:
      code-lab-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 15s
      timeout: 5s
      start_period: 15s
      retries: 5

  runner-java-25:
    <<: *runner-build-only
    build:
      context: ./runners/java
      dockerfile: Dockerfile
      args:
        JAVA_MAJOR: "25"
    image: ${RUNNER_JAVA_25_IMAGE:-code-challenge-ide-runner-java-25:local}

  runner-java-26:
    <<: *runner-build-only
    build:
      context: ./runners/java
      dockerfile: Dockerfile
      args:
        JAVA_MAJOR: "26"
    image: ${RUNNER_JAVA_26_IMAGE:-code-challenge-ide-runner-java-26:local}

  runner-python-312:
    <<: *runner-build-only
    build:
      context: ./runners/python
      dockerfile: Dockerfile
    image: ${RUNNER_PYTHON_312_IMAGE:-code-challenge-ide-runner-python-312:local}

  runner-go-123:
    <<: *runner-build-only
    build:
      context: ./runners/go
      dockerfile: Dockerfile
    image: ${RUNNER_GO_123_IMAGE:-code-challenge-ide-runner-go-123:local}

  runner-node-22:
    <<: *runner-build-only
    build:
      context: ./runners/node
      dockerfile: Dockerfile
    image: ${RUNNER_NODE_22_IMAGE:-code-challenge-ide-runner-node-22:local}

  runner-dotnet-8:
    <<: *runner-build-only
    build:
      context: ./runners/dotnet
      dockerfile: Dockerfile
    image: ${RUNNER_DOTNET_8_IMAGE:-code-challenge-ide-runner-dotnet-8:local}

  runner-typescript-57:
    <<: *runner-build-only
    build:
      context: ./runners/typescript
      dockerfile: Dockerfile
    image: ${RUNNER_TYPESCRIPT_57_IMAGE:-code-challenge-ide-runner-typescript-57:local}

  runner-rust-184:
    <<: *runner-build-only
    build:
      context: ./runners/rust
      dockerfile: Dockerfile
    image: ${RUNNER_RUST_184_IMAGE:-code-challenge-ide-runner-rust-184:local}

  runner-cpp-20:
    <<: *runner-build-only
    build:
      context: ./runners/cpp
      dockerfile: Dockerfile
    image: ${RUNNER_CPP_20_IMAGE:-code-challenge-ide-runner-cpp-20:local}

  runner-react-19:
    <<: *runner-build-only
    build:
      context: ./runners/react
      dockerfile: Dockerfile
    image: ${RUNNER_REACT_19_IMAGE:-code-challenge-ide-runner-react-19:local}

  runner-vue-35:
    <<: *runner-build-only
    build:
      context: ./runners/vue
      dockerfile: Dockerfile
    image: ${RUNNER_VUE_35_IMAGE:-code-challenge-ide-runner-vue-35:local}

  runner-angular-19:
    <<: *runner-build-only
    build:
      context: ./runners/angular
      dockerfile: Dockerfile
    image: ${RUNNER_ANGULAR_19_IMAGE:-code-challenge-ide-runner-angular-19:local}

  runner-postgres-17:
    <<: *runner-build-only
    build:
      context: ./runners/sql
      dockerfile: Dockerfile
    image: ${RUNNER_POSTGRES_17_IMAGE:-code-challenge-ide-runner-postgres-17:local}

  runner-lsp-java:
    <<: *runner-build-only
    build:
      context: ./runners/lsp-java
      dockerfile: Dockerfile
    image: ${LSP_JAVA_IMAGE:-code-challenge-ide-lsp-java:local}

  runner-lsp-python:
    <<: *runner-build-only
    build:
      context: ./runners/lsp-python
      dockerfile: Dockerfile
    image: ${LSP_PYTHON_IMAGE:-code-challenge-ide-lsp-python:local}

  runner-lsp-go:
    <<: *runner-build-only
    build:
      context: ./runners/lsp-go
      dockerfile: Dockerfile
    image: ${LSP_GO_IMAGE:-code-challenge-ide-lsp-go:local}

  runner-lsp-typescript:
    <<: *runner-build-only
    build:
      context: ./runners/lsp-typescript
      dockerfile: Dockerfile
    image: ${LSP_TYPESCRIPT_IMAGE:-code-challenge-ide-lsp-typescript:local}

  runner-lsp-dotnet:
    <<: *runner-build-only
    build:
      context: ./runners/lsp-dotnet
      dockerfile: Dockerfile
    image: ${LSP_DOTNET_IMAGE:-code-challenge-ide-lsp-dotnet:local}

  runner-lsp-rust:
    <<: *runner-build-only
    build:
      context: ./runners/lsp-rust
      dockerfile: Dockerfile
    image: ${LSP_RUST_IMAGE:-code-challenge-ide-lsp-rust:local}

  runner-lsp-cpp:
    <<: *runner-build-only
    build:
      context: ./runners/lsp-cpp
      dockerfile: Dockerfile
    image: ${LSP_CPP_IMAGE:-code-challenge-ide-lsp-cpp:local}

  runner-m2-warm:
    image: ${RUNNER_JAVA_26_IMAGE:-code-challenge-ide-runner-java-26:local}
    user: "0:0"
    volumes:
      - ctl-runner-m2-cache:/tmp/home/.m2
    entrypoint:
      - /bin/bash
      - -c
      - |
        set -euo pipefail
        mkdir -p /tmp/home/.m2/repository
        if [ ! -f /tmp/home/.m2/repository/.warm ]; then
          cp -a /opt/m2/repository/. /tmp/home/.m2/repository/
          touch /tmp/home/.m2/repository/.warm
          echo "Maven cache volume warmed."
        else
          echo "Maven cache volume already warm."
        fi
    restart: "no"
    networks:
      - code-lab
      - coolify
    depends_on:
      runner-java-26:
        condition: service_completed_successfully

volumes:
  ctl-postgres-data:
  ctl-ops-data:
  ctl-runner-m2-cache:
    name: ctl-runner-m2-cache
